name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          set -e
          mkdir -p project
          ZIP=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)
          echo "Using ZIP: $ZIP"
          test -n "$ZIP"
          unzip -q "$ZIP" -d project
          find project -name "*.xcodeproj" -o -name "*.xcworkspace"

      - name: Fix Swift compile error
        run: |
          set -e
          echo "Fixing OpticalFlowQuality .balanced error..."

          if grep -R "OpticalFlowQuality = \.balanced" project --include="*.swift"; then
            if grep -R "case standard" project --include="*.swift"; then
              REPLACE="standard"
            elif grep -R "case medium" project --include="*.swift"; then
              REPLACE="medium"
            elif grep -R "case normal" project --include="*.swift"; then
              REPLACE="normal"
            elif grep -R "case basic" project --include="*.swift"; then
              REPLACE="basic"
            else
              REPLACE=$(grep -R "case " project --include="*.swift" | grep "OpticalFlowQuality" -A 20 | sed -n 's/.*case \([A-Za-z0-9_]*\).*/\1/p' | head -n 1)
            fi

            echo "Replacing .balanced with .$REPLACE"
            test -n "$REPLACE"

            find project -name "*.swift" -print0 | xargs -0 sed -i '' "s/OpticalFlowQuality = \.balanced/OpticalFlowQuality = .$REPLACE/g"
          else
            echo "No .balanced OpticalFlowQuality default found."
          fi

      - name: Build app
        run: |
          set -e
          cd project
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            TYPE="-workspace"
            FILE="$WORKSPACE"
          else
            TYPE="-project"
            FILE="$PROJECT"
          fi

          test -n "$FILE"

          SCHEME=$(xcodebuild -list $TYPE "$FILE" | awk '/Schemes:/{f=1;next} f && NF {print $1; exit}')
          test -n "$SCHEME"

          echo "Using file: $FILE"
          echo "Using scheme: $SCHEME"

          xcodebuild build \
            $TYPE "$FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$PWD/../build"

      - name: Package unsigned IPA
        run: |
          set -e
          mkdir -p output/Payload
          APP=$(find build -name "*.app" -type d | head -n 1)
          echo "Found app: $APP"
          test -n "$APP"
          cp -R "$APP" output/Payload/
          cd output
          /usr/bin/zip -qry Buzhen-unsigned.ipa Payload
          cd ..
          ls -lh output/Buzhen-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Buzhen-unsigned-ipa-${{ github.run_number }}
          path: output/Buzhen-unsigned.ipa
          retention-days: 7

      - name: Keep latest 3 IPA artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api repos/${{ github.repository }}/actions/artifacts --paginate \
            --jq '.artifacts[] | select(.name | startswith("Buzhen-unsigned-ipa")) | [.created_at, .id] | @tsv' \
            | sort -r \
            | tail -n +4 \
            | cut -f2 \
            | while read -r artifact_id; do
                if [ -n "$artifact_id" ]; then
                  echo "Deleting old artifact $artifact_id"
                  gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id
                fi
              done

      - name: Delete source project zip from repo
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ZIP_FILES=$(find . -maxdepth 1 -type f -name "*.zip" -print)

          if [ -z "$ZIP_FILES" ]; then
            echo "No source zip found to delete."
            exit 0
          fi

          echo "$ZIP_FILES" | while read -r file; do
            git rm "$file"
          done

          git commit -m "Delete source project zip after successful build"
          git push
