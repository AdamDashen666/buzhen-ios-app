name: Build iOS .app

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          mkdir -p project
          ZIP=$(find . -maxdepth 1 -type f -name "*.zip" | head -n 1)
          echo "Using ZIP: $ZIP"
          unzip -q "$ZIP" -d project
          find project -name "*.xcodeproj" -o -name "*.xcworkspace"

      - name: Build app
        run: |
          cd project
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            TYPE="-workspace"
            FILE="$WORKSPACE"
          else
            TYPE="-project"
            FILE="$PROJECT"
          fi

          SCHEME=$(xcodebuild -list $TYPE "$FILE" | awk '/Schemes:/{f=1;next} f && NF {print $1; exit}')

          echo "Using file: $FILE"
          echo "Using scheme: $SCHEME"

          xcodebuild build \
            $TYPE "$FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$PWD/../build"

      - name: Collect and zip app
        run: |
          mkdir -p output
          APP=$(find build -name "*.app" -type d | head -n 1)
          echo "Found app: $APP"
          test -n "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" output/Buzhen-app.zip

      - name: Upload app
        uses: actions/upload-artifact@v4
        with:
          name: Buzhen-app
          path: output/Buzhen-app.zip
