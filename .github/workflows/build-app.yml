name: Build iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: |
          set -e
          mkdir -p project logs
          ZIP=$(find . -maxdepth 1 -type f -name "*.zip" -print | sort -V | tail -n 1)
          echo "Using ZIP: $ZIP" | tee logs/input-zip.txt
          test -n "$ZIP"
          unzip -q "$ZIP" -d project
          find project -name "*.xcodeproj" -o -name "*.xcworkspace" | tee logs/project-files.txt
          find project -maxdepth 4 -type f | sort > logs/project-file-list.txt

      - name: Build app
        run: |
          set -e
          mkdir -p "$GITHUB_WORKSPACE/logs"
          cd project
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          PROJECT=$(find . -name "*.xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            TYPE="-workspace"
            FILE="$WORKSPACE"
          else
            TYPE="-project"
            FILE="$PROJECT"
          fi

          test -n "$FILE"

          echo "Using file: $FILE" | tee "$GITHUB_WORKSPACE/logs/build-summary.txt"
          xcodebuild -list $TYPE "$FILE" 2>&1 | tee "$GITHUB_WORKSPACE/logs/xcodebuild-list.txt"
          SCHEME=$(awk '/Schemes:/{f=1;next} f && NF {print $1; exit}' "$GITHUB_WORKSPACE/logs/xcodebuild-list.txt")
          test -n "$SCHEME"

          echo "Using scheme: $SCHEME" | tee -a "$GITHUB_WORKSPACE/logs/build-summary.txt"
          xcodebuild -version | tee "$GITHUB_WORKSPACE/logs/xcode-version.txt"
          xcode-select -p | tee "$GITHUB_WORKSPACE/logs/xcode-select.txt"

          set +e
          xcodebuild build \
            $TYPE "$FILE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -resultBundlePath "$GITHUB_WORKSPACE/logs/Build.xcresult" \
            CODE_SIGNING_ALLOWED=NO \
            BUILD_DIR="$PWD/../build" \
            2>&1 | tee "$GITHUB_WORKSPACE/logs/xcodebuild.log"

          STATUS=${PIPESTATUS[0]}

          echo "xcodebuild exit status: $STATUS" | tee -a "$GITHUB_WORKSPACE/logs/build-summary.txt"
          echo "========== REAL ERRORS ==========" | tee "$GITHUB_WORKSPACE/logs/xcodebuild-errors.txt"
          grep -nEi "error:|fatal error:|build failed|failed|cannot find|no such module|undefined symbol|exit code 65" "$GITHUB_WORKSPACE/logs/xcodebuild.log" | tee -a "$GITHUB_WORKSPACE/logs/xcodebuild-errors.txt" || true
          echo "=================================" | tee -a "$GITHUB_WORKSPACE/logs/xcodebuild-errors.txt"

          exit $STATUS

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-logs-${{ github.run_number }}
          path: logs/**
          retention-days: 7

      - name: Package unsigned IPA
        run: |
          set -e
          mkdir -p output/Payload
          APP=$(find build -name "*.app" -type d | head -n 1)
          echo "Found app: $APP"
          test -n "$APP"
          cp -R "$APP" output/Payload/
          cd output
          /usr/bin/zip -qry Buzhen-unsigned.ipa Payload
          cd ..
          ls -lh output/Buzhen-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Buzhen-unsigned-ipa-${{ github.run_number }}
          path: output/Buzhen-unsigned.ipa
          retention-days: 7

      - name: Keep latest 3 IPA artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          gh api repos/${{ github.repository }}/actions/artifacts --paginate \
            --jq '.artifacts[] | select(.name | startswith("Buzhen-unsigned-ipa")) | [.created_at, .id] | @tsv' \
            | sort -r \
            | tail -n +4 \
            | cut -f2 \
            | while read -r artifact_id; do
                if [ -n "$artifact_id" ]; then
                  echo "Deleting old artifact $artifact_id"
                  gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$artifact_id
                fi
              done

      - name: Delete source project zip from repo
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          ZIP_FILES=$(find . -maxdepth 1 -type f -name "*.zip" -print)

          if [ -z "$ZIP_FILES" ]; then
            echo "No source zip found to delete."
            exit 0
          fi

          echo "$ZIP_FILES" | while read -r file; do
            git rm "$file"
          done

          git commit -m "Delete source project zip after successful build"
          git push
